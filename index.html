<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEMS — Tobacco Enterprise Management System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" href="assets/icons/icon-192.png">
  <style>
    body {
      background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      font-family: sans-serif; color: #e6edf3;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #2a3548;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo { font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">🌿</div>
    <div class="spinner"></div>
    <div style="font-size:0.85rem;color:#565f6d">Loading TEMS…</div>
  </div>
<script src="js/config.js"></script>
<script>
  // Redirect based on auth state
  const token = localStorage.getItem(TEMS_CONFIG.TOKEN_KEY);
  const user  = (() => { try { return JSON.parse(localStorage.getItem(TEMS_CONFIG.USER_KEY)); } catch { return null; } })();
  setTimeout(() => {
    if (token && user) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'login.html';
    }
  }, 500);
</script>
</body>
</html>
