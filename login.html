<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TEMS</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" href="assets/icons/icon-192.png">
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">

    <div class="login-logo">
      <img src="assets/icons/icon-192.png" alt="TEMS" width="72" height="72"
           onerror="this.style.display='none'">
      <div class="login-app-name">TEMS</div>
      <div class="login-app-sub">Tobacco Enterprise Management System</div>
    </div>

    <h2 class="login-title">Welcome back</h2>
    <p class="login-subtitle">Sign in to access your workspace</p>

    <div id="error-box" class="alert alert-danger" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username"
             placeholder="Enter your username" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div style="position:relative">
        <input class="form-input" type="password" id="password"
               placeholder="Enter your password" autocomplete="current-password">
        <button type="button" id="toggle-pw"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                 background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem">
          👁
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">
      Sign In
    </button>

    <div style="margin-top:16px;font-size:0.78rem;color:var(--text-muted);text-align:center">
      Default: admin / Admin@1234
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script>
// Already logged in? Go to dashboard
try {
  const tok  = localStorage.getItem(TEMS_CONFIG.TOKEN_KEY);
  const user = JSON.parse(localStorage.getItem(TEMS_CONFIG.USER_KEY) || 'null');
  if (tok && user) window.location.href = 'dashboard.html';
} catch(e) {}

// Toggle password visibility
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

// Press Enter to login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errBox   = document.getElementById('error-box');
  const btn      = document.getElementById('login-btn');

  errBox.style.display = 'none';

  if (!username || !password) {
    errBox.textContent = 'Please enter your username and password.';
    errBox.style.display = 'block';
    return;
  }

  btn.textContent = 'Signing in…';
  btn.disabled    = true;

  try {
    // Pure GET request — no POST, no JSON headers, no CORS issues
    const url = TEMS_CONFIG.APPS_SCRIPT_URL
      + '?action=login'
      + '&username=' + encodeURIComponent(username)
      + '&password=' + encodeURIComponent(password);

    const res  = await fetch(url);
    const data = await res.json();

    if (data.success) {
      localStorage.setItem(TEMS_CONFIG.TOKEN_KEY, data.token);
      localStorage.setItem(TEMS_CONFIG.USER_KEY,  JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      errBox.textContent  = data.message || 'Login failed. Check your username and password.';
      errBox.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled    = false;
    }

  } catch (err) {
    errBox.textContent  = 'Connection failed: ' + err.message + '. Check your internet connection.';
    errBox.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled    = false;
  }
}
</script>
</body>
</html>
