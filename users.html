<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — TEMS</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" href="assets/icons/icon-192.png">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="header-container"></div>
    <div class="page-content">
      <div id="offline-banner-container"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title">User Management</h1>
          <p class="page-subtitle">Manage system users, roles, and access permissions</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openUserModal()">＋ Add User</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">System Users</span>
          <div style="display:flex;gap:8px">
            <div class="toolbar-search" style="margin:0">
              <span>🔍</span>
              <input type="text" id="search-input" placeholder="Search users…" oninput="filterUsers()">
            </div>
            <select class="form-input" id="role-filter" onchange="filterUsers()" style="width:130px;padding:7px">
              <option value="">All Roles</option>
              <option value="admin">Admin</option>
              <option value="manager">Manager</option>
              <option value="staff">Staff</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Name</th><th>Username</th><th>Email</th>
              <th>Role</th><th>Status</th><th>Created</th><th>Actions</th>
            </tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="user-modal-title">Add User</h2>
      <button class="modal-close" data-close-modal="user-modal">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="user-id">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" type="text" id="user-fullname" placeholder="e.g. Amani Tarehe">
        </div>
        <div class="form-group">
          <label class="form-label">Username *</label>
          <input class="form-input" type="text" id="user-username" placeholder="e.g. amani.tarehe" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="user-email" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" id="user-phone" placeholder="+255 …">
        </div>
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select class="form-input" id="user-role">
            <option value="">Select role…</option>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="staff">Staff</option>
          </select>
        </div>
        <div class="form-group" id="password-group">
          <label class="form-label">Password *</label>
          <input class="form-input" type="password" id="user-password" placeholder="Minimum 8 characters" autocomplete="new-password">
        </div>
      </div>
      <div id="role-desc" style="margin-top:12px;padding:12px;background:var(--bg-hover);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--text-secondary)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-modal="user-modal">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/config.js"></script>
<script src="js/offline-sync.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById('sidebar-container').innerHTML = AppTemplate.getSidebarHTML();
document.getElementById('header-container').innerHTML = AppTemplate.getHeaderHTML('Users', 'Administration › Users');
document.getElementById('offline-banner-container').innerHTML = AppTemplate.getOfflineBanner();

let allUsers = [];
let currentPage = 1;
const PER_PAGE = TEMS_CONFIG.ROWS_PER_PAGE;

const ROLE_DESCS = {
  admin: '🔑 Full access: manage all modules, users, reports, settings, and system configuration.',
  manager: '📊 Can manage suppliers, record purchases, monitor stock, and view reports.',
  staff: '📋 Can record sales, view stock levels, and access assigned modules only.'
};

document.getElementById('user-role').addEventListener('change', function() {
  const desc = document.getElementById('role-desc');
  desc.textContent = ROLE_DESCS[this.value] || '';
});

async function loadPageData() {
  UI.showTableLoading('users-tbody');
  try {
    if (!navigator.onLine) {
      UI.showTableEmpty('users-tbody', 'User management requires internet connection.');
      return;
    }
    const data = await API.getUsers();
    allUsers = data.users || [];
    filterUsers();
  } catch (err) {
    UI.showToast('error', 'Error', 'Could not load users.');
    UI.showTableEmpty('users-tbody');
  }
}

function filterUsers() {
  const q  = document.getElementById('search-input').value.toLowerCase();
  const r  = document.getElementById('role-filter').value;
  const filtered = allUsers.filter(u =>
    (!q || u.fullName?.toLowerCase().includes(q) || u.username?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q)) &&
    (!r || u.role === r)
  );
  currentPage = 1;
  renderUsers(filtered);
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  const currentUser = Auth.getUser();
  if (!users.length) { UI.showTableEmpty('users-tbody'); return; }
  const start = (currentPage - 1) * PER_PAGE;
  const page  = users.slice(start, start + PER_PAGE);
  tbody.innerHTML = page.map(u => {
    const isMe = u.id === currentUser?.id;
    const roleCls = { admin: 'role-admin badge', manager: 'role-manager badge', staff: 'role-staff badge' };
    const initials = (u.fullName || u.username).split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="user-avatar" style="width:32px;height:32px;font-size:0.75rem;flex-shrink:0">${initials}</div>
            <div>
              <div class="strong">${u.fullName || '—'}</div>
              ${isMe ? '<div style="font-size:0.7rem;color:var(--accent)">• You</div>' : ''}
            </div>
          </div>
        </td>
        <td class="mono">${u.username}</td>
        <td>${u.email || '—'}</td>
        <td><span class="${roleCls[u.role] || 'badge badge-muted'}">${u.role || '—'}</span></td>
        <td><span class="badge ${u.active !== false ? 'badge-green' : 'badge-red'}">${u.active !== false ? 'Active' : 'Inactive'}</span></td>
        <td>${UI.formatDate(u.createdAt)}</td>
        <td>
          <div style="display:flex;gap:6px">
            ${!isMe ? `
              <button class="btn btn-secondary btn-sm" onclick='openUserModal(${JSON.stringify(u).replace(/'/g,"&#39;")})'>✏️</button>
              <button class="btn btn-${u.active !== false ? 'danger' : 'secondary'} btn-sm"
                onclick="toggleUser('${u.id}','${u.fullName||u.username}',${u.active !== false})">
                ${u.active !== false ? '🚫 Deactivate' : '✅ Activate'}
              </button>
            ` : '<span style="font-size:0.75rem;color:var(--text-muted)">Current user</span>'}
          </div>
        </td>
      </tr>
    `;
  }).join('');
  UI.buildPagination('pagination', users.length, currentPage, PER_PAGE, p => { currentPage = p; renderUsers(users); });
}

function openUserModal(user = null) {
  const isEdit = !!user;
  document.getElementById('user-id').value       = user?.id || '';
  document.getElementById('user-fullname').value = user?.fullName || '';
  document.getElementById('user-username').value = user?.username || '';
  document.getElementById('user-email').value    = user?.email || '';
  document.getElementById('user-phone').value    = user?.phone || '';
  document.getElementById('user-role').value     = user?.role || '';
  document.getElementById('user-password').value = '';
  document.getElementById('user-modal-title').textContent = isEdit ? 'Edit User' : 'Add User';
  document.getElementById('password-group').querySelector('label').textContent = isEdit ? 'New Password (leave blank to keep)' : 'Password *';
  document.getElementById('role-desc').textContent = ROLE_DESCS[user?.role] || '';
  UI.openModal('user-modal');
}

async function saveUser() {
  const id       = document.getElementById('user-id').value;
  const fullName = document.getElementById('user-fullname').value.trim();
  const username = document.getElementById('user-username').value.trim();
  const role     = document.getElementById('user-role').value;
  const password = document.getElementById('user-password').value;

  if (!fullName || !username || !role) {
    UI.showToast('warning', 'Validation', 'Full name, username, and role are required.'); return;
  }
  if (!id && !password) {
    UI.showToast('warning', 'Validation', 'Password is required for new users.'); return;
  }
  if (password && password.length < 8) {
    UI.showToast('warning', 'Validation', 'Password must be at least 8 characters.'); return;
  }

  const payload = {
    id: id || undefined, fullName, username, role,
    email: document.getElementById('user-email').value.trim(),
    phone: document.getElementById('user-phone').value.trim(),
    ...(password ? { password } : {}),
    active: true
  };

  try {
    await API.post(id ? 'updateUser' : 'createUser', payload);
    UI.closeModal('user-modal');
    UI.showToast('success', id ? 'User Updated' : 'User Created', fullName);
    loadPageData();
  } catch (err) { UI.showToast('error', 'Save Failed', err.message); }
}

function toggleUser(id, name, isActive) {
  const action = isActive ? 'deactivate' : 'activate';
  UI.confirm(`${action === 'deactivate' ? 'Deactivate' : 'Activate'} user "${name}"?`, async () => {
    try {
      await API.post(isActive ? 'deactivateUser' : 'updateUser', { id, active: !isActive });
      UI.showToast('success', 'Updated', `${name} ${isActive ? 'deactivated' : 'activated'}.`);
      loadPageData();
    } catch (err) { UI.showToast('error', 'Failed', err.message); }
  }, { title: `${action === 'deactivate' ? 'Deactivate' : 'Activate'} User`, danger: isActive });
}

if (UI.initPage('users')) loadPageData();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(console.warn);
</script>
</body>
</html>
